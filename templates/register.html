<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register – Dyscalculia Detection</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="navbar">🧠 Dyscalculia Detection System</div>
  <div class="container" style="max-width:560px;">
    <div class="card">
      <h2>Create Account</h2>
      {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
      <form method="POST">

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Minimum 8 characters" required>
        </div>

        <div class="form-group">
          <label>Age</label>
          <input type="number" name="age" placeholder="Enter age (6–99)" min="6" max="99" required>
          <small style="color:var(--text-secondary);font-size:13px;">
            Age determines which model and test difficulty are used.
          </small>
        </div>

        <div class="form-group">
          <label>Role</label>
          <select name="role" onchange="toggleStudentFields(this.value)" required>
            <option value="">Select role…</option>
            <option value="Student">Student</option>
            <option value="Teacher">Teacher</option>
            <option value="Parent">Parent</option>
          </select>
        </div>

        <div id="studentFields" style="display:none;">
          <div class="form-group">
            <label>Assign Teacher (optional)</label>
            <select name="teacher_id">
              <option value="">None</option>
              {% for t in teachers %}
              <option value="{{ t.id }}">{{ t.email }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Assign Parent (optional)</label>
            <select name="parent_id">
              <option value="">None</option>
              {% for p in parents %}
              <option value="{{ p.id }}">{{ p.email }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <button class="btn btn-primary" type="submit" style="width:100%;margin-top:8px;">Register</button>
      </form>
      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--text-secondary);">
        Already have an account? <a href="/login" style="color:var(--blue);font-weight:500;">Login</a>
      </p>
    </div>
  </div>
  <script>
    function toggleStudentFields(role) {
      document.getElementById("studentFields").style.display = role === "Student" ? "block" : "none";
    }
  </script>
</body>
</html>
