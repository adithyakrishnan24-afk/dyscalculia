<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login – Dyscalculia Detection</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .login-wrapper { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 60px); }
    .login-card { width:100%; max-width:440px; background:#fff; padding:48px 40px; border-radius:16px;
                  box-shadow:0 8px 30px rgba(0,0,0,.12); border:1px solid var(--border); }
    .login-card h2 { font-size:26px; margin-bottom:28px; }
    .login-card .btn { width:100%; text-align:center; padding:13px; font-size:15px; margin-top:8px; }
    .register-link { display:block; text-align:center; margin-top:20px; font-size:14px; color:var(--text-secondary); }
    .register-link a { color:var(--blue); font-weight:500; text-decoration:none; }
    .register-link a:hover { text-decoration:underline; }
    .brand-icon { font-size:48px; display:block; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="navbar">🧠 Dyscalculia Detection System</div>
  <div class="login-wrapper">
    <div class="login-card">
      <span class="brand-icon center">🔐</span>
      <h2 class="center">Welcome Back</h2>
      {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
      <form method="POST">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button class="btn btn-primary" type="submit">Login</button>
      </form>
      <p class="register-link">Don't have an account? <a href="/register">Register here</a></p>
    </div>
  </div>
</body>
</html>
