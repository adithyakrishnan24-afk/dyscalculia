<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Symbolic Comparison Test</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="navbar">🧠 Dyscalculia Detection System</div>
  <div class="container" style="max-width:680px;">
    <div class="card center">
      <h2>Which number is larger?</h2>
      <p style="color:var(--text-secondary);margin:8px 0 4px;">Trial {{ trial }} of {{ total }}</p>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" style="width:{{ (trial/total*100)|int }}%"></div>
      </div>

      <form method="POST" action="/submit_symbolic">
        <input type="hidden" name="response_time" id="response_time">
        <div class="symbolic-options">
          <button type="submit" name="choice" value="left"  class="symbolic-btn">{{ left }}</button>
          <button type="submit" name="choice" value="right" class="symbolic-btn">{{ right }}</button>
        </div>
      </form>
    </div>
  </div>
  <script>
    let startTime = Date.now();
    document.querySelectorAll(".symbolic-btn").forEach(btn => {
      btn.addEventListener("click", function() {
        document.getElementById("response_time").value = (Date.now() - startTime) / 1000;
      });
    });
  </script>
</body>
</html>
