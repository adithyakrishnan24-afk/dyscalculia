<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Symbolic Test Complete</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="navbar">🧠 Dyscalculia Detection System</div>
  <div class="container" style="max-width:560px;">
    <div class="card center">
      <div style="font-size:52px;margin-bottom:12px;">✅</div>
      <h2>Symbolic Comparison Complete</h2>
      <p style="color:var(--text-secondary);margin:12px 0 24px;">Your results for this section:</p>
      <div style="display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:24px;">
        <div style="background:#f8fafc;border-radius:12px;padding:20px 32px;border:1px solid var(--border);">
          <p style="font-size:13px;color:var(--text-secondary);">Accuracy</p>
          <p style="font-size:28px;font-weight:800;color:var(--blue-dark);">{{ accuracy }}</p>
        </div>
        <div style="background:#f8fafc;border-radius:12px;padding:20px 32px;border:1px solid var(--border);">
          <p style="font-size:13px;color:var(--text-secondary);">Avg Reaction Time</p>
          <p style="font-size:28px;font-weight:800;color:var(--blue-dark);">{{ mean_rt }}s</p>
        </div>
      </div>
      <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
